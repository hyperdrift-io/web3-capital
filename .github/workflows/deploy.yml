name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy web3-capital
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 69.62.124.138
          username: yannvr
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /home/yannvr/web3-capital
            git pull origin main
            npm ci
            npm run build
            pm2 restart web3-capital
            pm2 save
