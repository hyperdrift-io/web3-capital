name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

  deploy:
    name: Deploy web3-capital
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 69.62.124.138
          username: yannvr
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/home/yannvr/apps/web3-capital/prod/code"
            CONFIG_DIR="/home/yannvr/apps/web3-capital/prod/config"

            mkdir -p "$DEPLOY_DIR" "$CONFIG_DIR"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone git@github.com:hyperdrift-io/web3-capital.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Keep previous immutable chunk files so open tabs from the prior
            # release can still lazy-load route chunks without 404s.
            PREV_CHUNKS_DIR="/tmp/web3-capital-prev-chunks"
            rm -rf "$PREV_CHUNKS_DIR"
            if [ -d "$DEPLOY_DIR/.next/static/chunks" ]; then
              mkdir -p "$PREV_CHUNKS_DIR"
              cp -R "$DEPLOY_DIR/.next/static/chunks" "$PREV_CHUNKS_DIR/chunks"
            fi

            if [ -f "$CONFIG_DIR/.env" ]; then
              ln -sf "$CONFIG_DIR/.env" "$DEPLOY_DIR/.env"
            fi

            corepack enable
            corepack prepare pnpm@9.15.9 --activate

            rm -rf "$DEPLOY_DIR/.next"
            pnpm install --frozen-lockfile
            pnpm run build

            if [ -d "$PREV_CHUNKS_DIR/chunks" ]; then
              mkdir -p "$DEPLOY_DIR/.next/static/chunks"
              cp -Rn "$PREV_CHUNKS_DIR/chunks/." "$DEPLOY_DIR/.next/static/chunks/" || true
            fi

            pm2 restart web3-capital --update-env
            pm2 save

  release:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            --generate-notes \
            --title "$TAG" \
            --target main
          echo "✅ Release $TAG created"
