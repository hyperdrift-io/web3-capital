name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  deploy:
    name: Deploy web3-capital
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 69.62.124.138
          username: yannvr
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/home/yannvr/apps/web3-capital/prod/code"
            CONFIG_DIR="/home/yannvr/apps/web3-capital/prod/config"

            mkdir -p "$DEPLOY_DIR" "$CONFIG_DIR"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone git@github.com:hyperdrift-io/web3-capital.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            if [ -f "$CONFIG_DIR/.env" ]; then
              ln -sf "$CONFIG_DIR/.env" "$DEPLOY_DIR/.env"
            fi

            npm ci
            npm run build
            pm2 restart web3-capital --update-env
            pm2 save
